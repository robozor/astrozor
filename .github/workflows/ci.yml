name: CI

on:
  push:
    branches: [main]
  pull_request:
  # Manual fallback — handy when an Actions outage blocks push triggers
  # and we want to re-validate a specific main commit.
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (backend + frontend)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Lint backend (ruff)
        run: |
          docker run --rm -v ${{ github.workspace }}/backend:/app -w /app python:3.12-slim-bookworm \
            sh -c "pip install --quiet ruff==0.8.6 && ruff check ."

      - name: Typecheck frontend (tsc)
        run: |
          docker run --rm -v ${{ github.workspace }}/frontend:/app -w /app node:22-alpine \
            sh -c "npm install --silent --no-audit --no-fund && npm run typecheck"

  smoke:
    name: Stack smoke test
    runs-on: ubuntu-latest
    needs: lint
    env:
      # Stick to the runner's docker daemon (its built-in BuildKit) so that
      # the image produced by "compose --profile build build python-base"
      # lands in the same store the next "compose build" reads its
      # BASE_IMAGE FROM. setup-buildx-action's container-based builder
      # has a *separate* image store and the api build then fell back to
      # pulling astrozor/python-base:dev from docker.io (404).
      DOCKER_BUILDKIT: "1"
      COMPOSE_DOCKER_CLI_BUILD: "1"
    steps:
      - uses: actions/checkout@v4

      - name: Copy .env.example to .env
        run: cp .env.example .env

      # Use Makefile targets so the host-side OS detection (chmod for
      # bind-mounted entrypoint.sh on Linux/macOS, no-op on Windows) is
      # exercised the same way as a local dev would run it.
      - name: Build images
        run: make build

      - name: Start stack
        run: make up

      - name: Wait for proxy healthz
        run: |
          for i in $(seq 1 60); do
            code=$(curl -s -o /dev/null -w "%{http_code}" http://localhost/api/v1/healthz || echo "000")
            if [ "$code" = "200" ]; then echo "OK"; exit 0; fi
            sleep 2
          done
          echo "FAILED — dumping logs"
          docker compose -p astrozor ps
          docker compose -p astrozor logs --tail=200
          exit 1

      - name: Capture logs on failure
        if: failure()
        run: docker compose -p astrozor logs --tail=300

      - name: Tear down
        if: always()
        run: docker compose -p astrozor down -v
